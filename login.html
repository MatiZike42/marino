<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariño | Acceso Administrativo</title>
    <!-- Awesome Font Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="mariño.ico" type="image/x-icon">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(rgba(75, 75, 75, 0.9), rgba(75, 75, 75, 0.95)), url('https://images.unsplash.com/photo-1541123437800-1c5c16b14d2e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 3rem 2rem;
            border-radius: 20px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 2rem;
            color: var(--accent-color);
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(75, 75, 75, 0.6);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .error-msg {
            color: var(--danger-color);
            margin-bottom: 1rem;
            display: none;
        }
    </style>

    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768) {
            var currentParams = window.location.hash + window.location.search;
            window.location.href = "m_login.html" + currentParams;
        }
    </script>
</head>

<body>
    <nav class="navbar glass" id="navbar">
        <a href="index.html" class="logo">
            <img src="mariño.png" alt="Mariño Logo" class="nav-logo">
            <div style="display: flex; flex-direction: column; justify-content: center; line-height: 1.1;">
                <div>Mariño</div>
                <div style="font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); font-family: 'Inter', sans-serif; letter-spacing: 0;">construcción en seco &amp; decoraciones</div>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="index">Inicio</a></li>
            <li><a href="index#nosotros">Nosotros</a></li>
            <li><a href="productos.html">Catálogo</a></li>
            <li><a href="obras">Obras</a></li>
            <li><a href="galeria">Multimedia</a></li>
            <li><a href="rrhh">RRHH</a></li>
            <li><a href="consultas">Consultas</a></li>
            <li><a href="index#contacto">Contacto</a></li>
            <li><a href="login" id="nav-login" style="color: var(--accent-color);"><i class="fas fa-lock"></i></a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="login-box glass">
            <img src="mariño.png" alt="Logo Mariño" style="width:72px;margin-bottom:1.2rem;">
            <h2>Acceso al Sistema</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2.5rem; font-size:0.95rem;">
                Iniciá sesión con Google para acceder a las funciones administrativas.
            </p>

            <button id="google-login-btn"
                onclick="loginWithGoogle()"
                style="
                    display: flex; align-items: center; justify-content: center; gap: 0.8rem;
                    width: 100%; padding: 0.9rem 1.5rem;
                    background: white; color: #333;
                    border: none; border-radius: 10px;
                    font-size: 1rem; font-family: 'Inter', sans-serif; font-weight: 500;
                    cursor: pointer; transition: box-shadow 0.2s;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
                ">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                     alt="Google" style="width:22px;height:22px;">
                Continuar con Google
            </button>

            <p id="login-error" style="margin-top:1.2rem;color:var(--danger-color);display:none;font-size:0.9rem;"></p>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="auth.js"></script>
</body>

</html>
