<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariño | Acceso Administrativo</title>
    <!-- Awesome Font Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="mariño.ico" type="image/x-icon">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(rgba(75, 75, 75, 0.9), rgba(75, 75, 75, 0.95)), url('https://images.unsplash.com/photo-1541123437800-1c5c16b14d2e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 3rem 2rem;
            border-radius: 20px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 2rem;
            color: var(--accent-color);
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(75, 75, 75, 0.6);
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .error-msg {
            color: var(--danger-color);
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <nav class="navbar glass" id="navbar">
        <a href="index.html" class="logo">
            <img src="mariño.png" alt="Mariño Logo" class="nav-logo">
            <div style="display: flex; flex-direction: column; justify-content: center; line-height: 1.1;">
                <div>Mariño</div>
                <div
                    style="font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); font-family: 'Inter', sans-serif; letter-spacing: 0;">
                    construcción en seco & decoraciones</div>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="productos.html">Catálogo</a></li>
            <li><a href="obras.html">Obras</a></li>
            <li><a href="rrhh.html">RRHH</a></li>
            <li><a href="consultas.html">Consultas</a></li>
            <li><a href="index.html#contacto">Contacto</a></li>
            <li><a href="login.html" id="nav-login" style="color: var(--accent-color);"><i class="fas fa-lock"></i></a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="login-box glass">
            <h2>Acceso al Sistema</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Iniciá sesión para acceder a las funciones administrativas o para autocompletar tus datos en futuras consultas.</p>
            
            <div id="g_id_onload"
                 data-client_id="1057095210405-svt45t2boe1ebpf17dmoi6uae64ev42a.apps.googleusercontent.com"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-size="large"
                 data-theme="outline"
                 data-text="sign_in_with"
                 data-shape="rectangular"
                 data-logo_alignment="left">
            </div>
            
            <p class="error-msg" id="login-error" style="margin-top: 1rem; color: var(--accent-color);">Hubo un error al iniciar sesión. Intentá nuevamente.</p>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="auth.js"></script>
</body>

</html>
