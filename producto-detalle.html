<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariño | Detalle del Producto</title>
    <!-- Awesome Font Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="mariño.ico" type="image/x-icon">
    <style>
        .detail-container {
            padding: 8rem 5% 4rem;
            /* Top padding to offset navbar */
            min-height: 80vh;
            max-width: 1200px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--accent-color);
        }

        .product-detail-layout {
            display: grid;
            grid-template-columns: 0.8fr 1.2fr;
            gap: 4rem;
            align-items: start;
        }

        .product-image-container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
        }

        .product-image-container img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            background: #ffffff;
            aspect-ratio: 1/1;
        }

        .product-info-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .pd-brand {
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .pd-title {
            font-size: 2.5rem;
            line-height: 1.2;
            color: var(--text-primary);
        }

        .pd-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.8;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .specs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .specs-table tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .specs-table tr:last-child {
            border-bottom: none;
        }

        .specs-table th {
            text-align: left;
            padding: 1rem 0;
            color: var(--text-secondary);
            font-weight: 500;
            width: 40%;
        }

        .specs-table td {
            text-align: right;
            padding: 1rem 0;
            color: var(--text-primary);
            font-weight: 600;
        }

        .buy-action {
            margin-top: 2rem;
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
        }

        .buy-action h4 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .loading-state,
        .error-state {
            text-align: center;
            padding: 4rem;
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .product-detail-layout {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .pd-title {
                font-size: 2rem;
            }
        }
    </style>

    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768) {
            var currentParams = window.location.hash + window.location.search;
            window.location.href = "m_producto-detalle.html" + currentParams;
        }
    </script>
</head>

<body>
    <nav class="navbar glass" id="navbar">
        <a href="index.html" class="logo">
            <img src="mariño.png" alt="Mariño Logo" class="nav-logo">
            <div style="display: flex; flex-direction: column; justify-content: center; line-height: 1.1;">
                <div>Mariño</div>
                <div
                    style="font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); font-family: 'Inter', sans-serif; letter-spacing: 0;">
                    construcción en seco & decoraciones</div>
            </div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html#inicio">Inicio</a></li>
            <li><a href="index.html#nosotros">Nosotros</a></li>
            <li><a href="productos.html" style="color: var(--accent-color);">Catálogo</a></li>
            <li><a href="obras.html">Obras</a></li>
            <li><a href="rrhh.html">RRHH</a></li>
            <li><a href="consultas.html">Consultas</a></li>
            <li><a href="index.html#contacto">Contacto</a></li>
            <li><a href="login.html" id="nav-login"><i class="fas fa-lock"></i></a></li>
        </ul>
    </nav>

    <div class="detail-container" id="detail-container">
        <div class="loading-state">
            <i class="fas fa-spinner fa-spin"
                style="font-size: 2rem; margin-bottom: 1rem; color: var(--accent-color);"></i>
            <p>Cargando detalles del producto...</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Mariño Construcción en seco y decoraciones. Todos los derechos reservados.</p>
    </footer>

    <script src="cart.js"></script>
    <script type="module">
        import { db } from './firebase-config.js';
        import { doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
            showError('Producto no especificado.');
        } else {
            loadProduct(productId);
        }

        async function loadProduct(id) {
            try {
                // Try direct doc fetch first
                const docRef = doc(db, "products", id);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    renderProductDetails({ id: docSnap.id, ...docSnap.data() });
                } else {
                    showError('El producto no existe o fue eliminado.');
                }
            } catch (error) {
                console.error("Error loading product:", error);
                showError('Error al cargar el producto. Verifica tu conexión.');
            }
        }

        window._showDetailError = function(msg) { showError(msg); };

        function showError(msg) {
            const container = document.getElementById('detail-container');
            container.innerHTML = `
                <a href="productos.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al catálogo</a>
                <div class="error-state glass" style="border-radius: 20px;">
                    <i class="fas fa-exclamation-circle" style="font-size: 3rem; margin-bottom: 1rem; color: var(--danger-color);"></i>
                    <p style="color: var(--text-primary); margin-bottom: 2rem;">${msg}</p>
                    <a href="productos.html" class="btn btn-primary">Ver Catálogo</a>
                </div>
            `;
        }

        function renderProductDetails(p) {
            const container = document.getElementById('detail-container');
            document.title = `Mariño | ${p.name}`;

            const safeName = (p.name || '').replace(/'/g, "\\'");
            const safeImg  = (p.img  || '').replace(/'/g, "\\'");
            const safeCat  = (p.category || '').replace(/'/g, "\\'");

            container.innerHTML = `
                <a href="productos.html" class="back-link reveal"><i class="fas fa-arrow-left"></i> Volver al catálogo</a>
                <div class="product-detail-layout">
                    <div class="product-image-container reveal delay-1">
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <div class="product-info-container reveal delay-2">
                        <div>
                            <div class="pd-brand">${p.provider || 'Distribuidor Local'}</div>
                            <h1 class="pd-title">${p.name}</h1>
                        </div>
                        <p class="pd-desc">${p.desc}</p>
                        <div>
                            <h3 style="margin-bottom: 1rem;">Especificaciones</h3>
                            <table class="specs-table">
                                <tbody>
                                    <tr><th>Categoría</th><td>${p.category || 'General'}</td></tr>
                                    <tr><th>Marca / Proveedor</th><td>${p.provider || 'N/A'}</td></tr>
                                    <tr><th>Color / Tonalidad</th><td>${p.color || 'Vario'}</td></tr>
                                    <tr><th>Medidas / Formato</th><td>${p.variants && p.variants.length > 0 ? p.variants.join(', ') : (p.size || 'Standard')}</td></tr>
                                </tbody>
                            </table>

                            ${p.variants && p.variants.length > 0 ? `
                            <div class="variant-selector" style="margin-top: 2rem;">
                                <label style="display: block; margin-bottom: 0.8rem; font-weight: 600; color: var(--accent-color);">Elegir ${p.category.includes('PVC') || p.category.includes('Moldura') ? 'Medida/Color' : 'Medida'}:</label>
                                <div class="variant-chips" style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                                    ${p.variants.map((v, idx) => `
                                        <button class="variant-chip" 
                                                style="padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid ${idx === 0 ? 'var(--accent-color)' : 'var(--glass-border)'}; background: ${idx === 0 ? 'rgba(254, 222, 89, 0.1)' : 'rgba(255,255,255,0.05)'}; color: ${idx === 0 ? 'var(--accent-color)' : 'white'}; cursor: pointer; transition: all 0.3s;"
                                                onclick="selectDetailVariant('${v}', this)">
                                            ${v}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                            ` : ''}

                            <div class="buy-action glass">
                                <h4>¿Te interesa este producto?</h4>
                                <p style="color: var(--text-secondary); margin-bottom: 1rem; font-size: 0.95rem;">
                                    Elegí la cantidad y sumalo a tu presupuesto.
                                </p>
                                <!-- Quantity selector -->
                                <div style="display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1.2rem;">
                                    <button id="detail-qty-minus" style="width:38px;height:38px;border-radius:50%;border:2px solid var(--accent-color);background:transparent;color:var(--accent-color);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">−</button>
                                    <span id="detail-qty-display" style="font-size:1.5rem;font-weight:700;min-width:36px;text-align:center;">1</span>
                                    <button id="detail-qty-plus" style="width:38px;height:38px;border-radius:50%;border:2px solid var(--accent-color);background:transparent;color:var(--accent-color);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">+</button>
                                </div>
                                <button id="detail-add-btn" class="btn btn-primary" style="width:100%;margin:0 0 1rem 0;display:flex;align-items:center;justify-content:center;gap:0.5rem;">
                                    <i class="fas fa-cart-plus" style="transform:translateY(1px);"></i> Sumar al Presupuesto
                                </button>
                                <a href="https://wa.me/5493404505350?text=Hola,%20quisiera%20consultar%20por%20el%20producto:%20${encodeURIComponent(p.name)}" target="_blank" class="btn btn-secondary" style="width:100%;margin:0;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:0.5rem;">
                                    <i class="fab fa-whatsapp" style="transform:translateY(1px);"></i> Consultar Directo
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Quantity logic
            let qty = 1;
            let selectedVariant = p.variants && p.variants.length > 0 ? p.variants[0] : '';
            let currentImg = p.img;

            // Load initial variant image if present
            if (selectedVariant && p.variantImgs && p.variantImgs[selectedVariant]) {
                currentImg = p.variantImgs[selectedVariant];
                setTimeout(() => {
                    const imgEl = document.querySelector('.product-image-container img');
                    if (imgEl) imgEl.src = currentImg;
                }, 0);
            }

            window.selectDetailVariant = (v, el) => {
                selectedVariant = v;
                
                // Switch image based on variant
                if (p.variantImgs && p.variantImgs[v]) {
                    currentImg = p.variantImgs[v];
                } else {
                    currentImg = p.img;
                }
                const imgEl = document.querySelector('.product-image-container img');
                if (imgEl) imgEl.src = currentImg;

                el.parentElement.querySelectorAll('.variant-chip').forEach(c => {
                    c.style.borderColor = 'var(--glass-border)';
                    c.style.background = 'rgba(255,255,255,0.05)';
                    c.style.color = 'white';
                });
                el.style.borderColor = 'var(--accent-color)';
                el.style.background = 'rgba(254, 222, 89, 0.1)';
                el.style.color = 'var(--accent-color)';
            };

            const qtyDisplay = document.getElementById('detail-qty-display');
            document.getElementById('detail-qty-minus').addEventListener('click', () => {
                if (qty > 1) { qty--; qtyDisplay.textContent = qty; }
            });
            document.getElementById('detail-qty-plus').addEventListener('click', () => {
                qty++;
                qtyDisplay.textContent = qty;
            });
            document.getElementById('detail-add-btn').addEventListener('click', () => {
                window.addToCart(p.id, p.name, currentImg, p.category, qty, selectedVariant);
            });

            if (typeof window.initAnimations === 'function') {
                setTimeout(window.initAnimations, 50);
            }
        }
    </script>
    <script src="app.js"></script>
</body>

</html>
